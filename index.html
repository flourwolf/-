<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>人狼GMツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
}

input, button, textarea {
  margin: 5px;
  padding: 6px;
  width: 90%;
  max-width: 400px;
}

.box {
  border: 1px solid #ccc;
  padding: 15px;
  margin-top: 20px;
}

.player { margin: 5px; }
.dead { color: gray; }
  .playerBtn {
  display: block;
  width: 90%;
  max-width: 400px;
  margin: 5px auto;
  padding: 10px;
  cursor: pointer;
}

.dead {
  background-color: #ccc;
  color: #666;
}
</style>
</head>

<body>

<h1>人狼GMツール</h1>

<!-- ===== フェーズ表示 ===== -->
<div class="box">
  <h2 id="phase"></h2>
  <div id="day"></div>
</div>

<!-- ===== 準備フェーズUI ===== -->
<div id="prepareUI" class="box">

  <h2>ゲーム設定</h2>

  シード値<br>
  <input id="seed"><br>

  参加人数（5人～）<br>
  <input id="count" type="number" min="5" value="5" onchange="createInputs()"><br>

  <div id="players"></div>

  <button onclick="generate()">役職生成</button>

  <h3>役職一覧（GM専用）</h3>
  <div id="result"></div>

  <h3>PL用URL</h3>
  <textarea id="url" rows="3"></textarea>

</div>

<!-- ===== 共通ゲームUI（追加） ===== -->
<div id="gameUI" class="box">

  <h2>ゲーム情報</h2>

  <h3>プレイヤー一覧</h3>
  <div id="playerList"></div>

  <h3>役職一覧（GM専用）</h3>
  <div id="roleList"></div>

  <h3>PL用URL</h3>
  <textarea id="urlDisplay" rows="3" readonly></textarea>

</div>

<!-- ===== 操作ボタン ===== -->
<div class="box">
  <button id="startBtn" onclick="startGame()">ゲーム開始</button>
  <button id="nextBtn" onclick="nextPhase()">次のフェーズへ</button>
  <button id="endBtn" onclick="forceEnd()">強制終了（テスト）</button>
</div>

<script>

/* ===============================
   フェーズ定義
================================ */
const PHASE = {
  PREPARE: "準備",
  MORNING: "朝",
  VOTE: "投票",
  NIGHT: "夜",
  RESULT: "終了"
};

/* ===============================
   状態
================================ */
let state = {
  phase: PHASE.PREPARE,
  day: 0,
  players: [],
  roles: [],
  alive: []
};

/* ===============================
   描画
================================ */
function render() {

  // フェーズ表示
  document.getElementById("phase").innerText =
    `フェーズ：${state.phase}`;

  document.getElementById("day").innerText =
    state.phase === PHASE.PREPARE || state.phase === PHASE.RESULT
      ? ""
      : `日数：${state.day}日目`;

  // ===== ボタン制御 =====
  const startBtn = document.getElementById("startBtn");
  const nextBtn  = document.getElementById("nextBtn");
  const endBtn   = document.getElementById("endBtn");

  if (state.phase === PHASE.PREPARE) {
    startBtn.style.display = "inline-block";
    nextBtn.style.display  = "none";
    endBtn.style.display   = "none";
  }

  else if (
    state.phase === PHASE.MORNING ||
    state.phase === PHASE.VOTE ||
    state.phase === PHASE.NIGHT
  ) {
    startBtn.style.display = "none";
    nextBtn.style.display  = "inline-block";
    endBtn.style.display   = "inline-block";
  }

  else if (state.phase === PHASE.RESULT) {
    startBtn.style.display = "inline-block";
    nextBtn.style.display  = "none";
    endBtn.style.display   = "none";
  }

  // ===== 準備UI制御 =====
  const prepareUI = document.getElementById("prepareUI");
  prepareUI.style.display =
    state.phase === PHASE.PREPARE ? "block" : "none";

  // ===== 共通UI制御（追加） =====
  const gameUI = document.getElementById("gameUI");

  if (
    state.phase === PHASE.MORNING ||
    state.phase === PHASE.VOTE ||
    state.phase === PHASE.NIGHT
  ) {
    gameUI.style.display = "block";
  } else {
    gameUI.style.display = "none";
  }

  // ===== 共通UIの中身（追加） =====
  if (state.players.length > 0) {

    // プレイヤー一覧
    const playerList = document.getElementById("playerList");
    const playerList = document.getElementById("playerList");
playerList.innerHTML = "";

state.players.forEach((p, i) => {

  const isDead = !state.alive[i];

  playerList.innerHTML += `
    <button 
      class="playerBtn ${isDead ? "dead" : ""}"
      onclick="onPlayerClick(${i})"
    >
      ${i+1}番：${p}
    </button>
  `;
});

    state.players.forEach((p, i) => {
      const cls = state.alive[i] ? "" : "dead";
      playerList.innerHTML += `<div class="${cls}">${i+1}番：${p}</div>`;
    });

    function onPlayerClick(index) {
  console.log("クリック:", state.players[index]);
}

    // 役職一覧
    const roleList = document.getElementById("roleList");
    roleList.innerHTML = "";

    state.players.forEach((p, i) => {
      roleList.innerHTML += `${p} → ${state.roles[i]}<br>`;
    });

    // URL表示（使い回し）
    document.getElementById("urlDisplay").value =
      document.getElementById("url").value;
  }
}

/* ===============================
   プレイヤー入力欄生成
================================ */
function createInputs() {
  const count = Number(document.getElementById("count").value);
  const div = document.getElementById("players");
  div.innerHTML = "";

  for (let i = 0; i < count; i++) {
    div.innerHTML += `<input class="player" placeholder="プレイヤー名${i+1}">`;
  }
}

createInputs();

/* ===============================
   シード乱数
================================ */
function seededRandom(seed) {
  let t = seed;
  return function() {
    t += 0x6D2B79F5;
    let r = Math.imul(t ^ t >>> 15, 1 | t);
    r ^= r + Math.imul(r ^ r >>> 7, 61 | r);
    return ((r ^ r >>> 14) >>> 0) / 4294967296;
  };
}

/* ===============================
   役職生成
================================ */
function generate() {

  const seedText = document.getElementById("seed").value;
  const count = Number(document.getElementById("count").value);
  const inputs = document.querySelectorAll(".player");

  const names = Array.from(inputs).map(i => i.value.trim());

  if (!seedText) return alert("シード値を入力してください");
  if (names.includes("")) return alert("名前をすべて入力してください");
  if (new Set(names).size !== names.length) return alert("名前が重複しています");

  let seed = 0;
  for (let c of seedText) seed += c.charCodeAt(0);
  const rand = seededRandom(seed);

  const roleConfig = {
    5:["村人","村人","村人","占い師","人狼"],
    6:["村人","村人","村人","村人","占い師","人狼"],
    7:["村人","村人","村人","村人","占い師","人狼","狂人"],
    8:["村人","村人","村人","村人","占い師","霊能者","人狼","人狼"],
    9:["村人","村人","村人","村人","占い師","霊能者","人狼","人狼","狂人"]
  };

  let roles = [...roleConfig[count]];

  for (let i = roles.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [roles[i], roles[j]] = [roles[j], roles[i]];
  }

  state.players = names;
  state.roles = roles;
  state.alive = names.map(() => true);

  const result = document.getElementById("result");
  result.innerHTML = "";

  for (let i = 0; i < count; i++) {
    result.innerHTML += `${names[i]} → ${roles[i]}<br>`;
  }

  const params = new URLSearchParams();
  params.set("seed", seedText);
  params.set("names", names.join(","));
  params.set("count", count);

  const url = location.origin + location.pathname.replace("index.html","") +
              "player.html?" + params.toString();

  document.getElementById("url").value = url;
}

/* ===============================
   ゲーム開始
================================ */
function startGame() {
  if (state.players.length === 0) {
    alert("先に役職生成をしてください");
    return;
  }

  state.phase = PHASE.MORNING;
  state.day = 1;
  render();
}

/* ===============================
   フェーズ遷移
================================ */
function nextPhase() {

  const isOk = confirm(`現在：${state.phase}\n次のフェーズへ進みますか？`);
  if (!isOk) return;

  switch(state.phase) {
    case PHASE.MORNING:
      state.phase = PHASE.VOTE;
      break;
    case PHASE.VOTE:
      state.phase = PHASE.NIGHT;
      break;
    case PHASE.NIGHT:
      state.phase = PHASE.MORNING;
      state.day++;
      break;
  }

  checkWin();
  render();
}

/* =============================== */
function checkWin() {}
function forceEnd() { endGame("（テスト）ゲーム終了"); }

function endGame(message) {
  state.phase = PHASE.RESULT;
  document.getElementById("phase").innerText = message;
  document.getElementById("day").innerText = "";
}

render();

</script>

</body>
</html>
